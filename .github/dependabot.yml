version: 2
updates:
  - package-ecosystem: pnpm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      nest:
        patterns:
          - '@nestjs*'
      react:
        patterns:
          - 'next'
          - 'react'
          - 'react-dom'
          - '@radix-ui*'
          - '@tanstack*'
      typeorm:
        patterns:
          - 'typeorm*'
      eslint:
        patterns:
          - 'eslint*'
          - '@typescript-eslint*'
      testing:
        patterns:
          - 'jest*'
          - '@swc*'
          - '@playwright*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
