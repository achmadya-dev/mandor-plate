name: CI

on:
  pull_request:
  push:
    branches: [master, main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test:
    name: Lint, typecheck, and unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test

  e2e:
    name: API E2E (PostgreSQL)
    runs-on: ubuntu-latest
    # Full-stack Playwright E2E is enabled in MP-011; this stage runs API E2E against Postgres.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: api
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U root -d api"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Configure API env
        run: cp apps/api/.env.example apps/api/.env

      - run: pnpm --filter @mandor-plate/shared build

      - run: pnpm --filter @mandor-plate/api migration:run

      - run: pnpm --filter @mandor-plate/api test:e2e
