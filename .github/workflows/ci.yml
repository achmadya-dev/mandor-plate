name: CI

on:
  pull_request:
  push:
    branches: [master, main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test:
    name: Lint, typecheck, and unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test

  e2e:
    name: Full-stack E2E
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: api
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U root -d api"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      maildev:
        image: maildev/maildev:2.1.0
        ports:
          - 1080:1080
          - 1025:1025
    env:
      CI: true
      PLAYWRIGHT_SKIP_SETUP: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Configure env
        run: |
          cp apps/api/.env.example apps/api/.env
          cp apps/web/.env.example apps/web/.env

      - run: pnpm test:e2e:prepare

      - name: Install Playwright browser
        run: pnpm --filter @mandor-plate/web test:e2e:install

      - run: pnpm test:e2e
